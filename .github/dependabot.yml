version: 2
updates:
  # Enable version updates for Python
  - package-ecosystem: "pip"
    directory: "/ai"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "jkeith10"
    assignees:
      - "jkeith10"

  # Enable version updates for Python API
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "jkeith10"
    assignees:
      - "jkeith10"

  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "jkeith10"
    assignees:
      - "jkeith10"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "jkeith10"
    assignees:
      - "jkeith10"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "jkeith10"
    assignees:
      - "jkeith10"

  # Enable version updates for Terraform
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "jkeith10"
    assignees:
      - "jkeith10" 